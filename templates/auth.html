<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login / Register</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            width: 380px;
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            background: #f1f1f1;
            border-radius: 12px;
            padding: 5px;
        }

        .tabs button {
            flex: 1;
            border: none;
            padding: 12px;
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #555;
        }

        .tabs button.active {
            background: #667eea;
            color: #fff;
        }

        .form {
            display: none;
            animation: fade 0.3s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        p {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-box {
            margin-bottom: 18px;
        }

        .input-box label {
            display: block;
            margin-bottom: 7px;
            font-size: 14px;
            color: #444;
            font-weight: 600;
        }

        .input-box input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .forgot {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.35);
        }

        .bottom-text {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            color: #666;
        }

        .bottom-text a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        @media (max-width: 430px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="tabs">
        <button class="tab-btn active" onclick="showForm('login')">Login</button>
        <button class="tab-btn" onclick="showForm('register')">Register</button>
    </div>

    {% if messages %}
        {% for message in messages %}
            <p style="text-align: center; color: red">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <!-- LOGIN FORM -->
    <form class="form active" id="login" method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <h2>Xush kelibsiz</h2>
        <p>Hisobingizga kiring</p>

        <div class="input-box">
            <label>Foydalanuvchi nomi</label>
            <input type="text" name="username" placeholder="Username kiriting" required/>
        </div>

        <div class="input-box">
            <label>Parol</label>
            <input type="password" name="password" placeholder="Parol kiriting" required/>
        </div>

        <div class="forgot">
            <a href="">Parolni unutdingizmi?</a>
        </div>

        <button type="submit" class="btn">Kirish</button>

        <div class="bottom-text">
            Hisobingiz yo‘qmi?
            <a onclick="showForm('register')">Ro‘yxatdan o‘tish</a>
        </div>
    </form>

    <!-- REGISTER FORM -->
    <form class="form" id="register" method="post" action="{% url 'register' %}">
        {% csrf_token %}
        <h2>Hisob yaratish</h2>
        <p>Yangi akkaunt oching</p>

        <div class="input-box">
            <label>Ism</label>
            <input type="text" name="first_name" placeholder="Ismingizni kiriting" required/>
        </div>

        <div class="input-box">
            <label>Familiya</label>
            <input type="text" name="last_name" placeholder="Familiyangizni kiriting"/>
        </div>

        <div class="input-box">
            <label>Username</label>
            <input type="text" name="username" placeholder="Username kiriting" required/>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" name="email" placeholder="Email kiriting" required/>
        </div>

        <div class="input-box">
            <label>Parol</label>
            <input type="password" name="password" placeholder="Parol kiriting" required/>
        </div>

        <div class="input-box">
            <label>Parolni tasdiqlash</label>
            <input type="password" name="password-repeat" placeholder="Parolni qayta kiriting" required/>
        </div>

        <button type="submit" class="btn">Ro‘yxatdan o‘tish</button>

        <div class="bottom-text">
            Hisobingiz bormi?
            <a onclick="showForm('login')">Kirish</a>
        </div>
    </form>

</div>

<script>
    function showForm(formId) {
        const forms = document.querySelectorAll(".form");
        const buttons = document.querySelectorAll(".tab-btn");

        forms.forEach(form => form.classList.remove("active"));
        buttons.forEach(btn => btn.classList.remove("active"));

        document.getElementById(formId).classList.add("active");

        if (formId === "login") {
            buttons[0].classList.add("active");
        } else {
            buttons[1].classList.add("active");
        }
    }
</script>

</body>
</html>
